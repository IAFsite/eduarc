<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDUARC Text Viewer</title>

<link rel="stylesheet" href="read.css">
<script src="read.js" defer></script>

</head>
<body>
<div class="topbar">

  <a class="back-btn" id="backBtn">
    ← Back
  </a>

  <div class="logo">
    <img src="iaf-logo.png">
    <span>EDUARC</span>
  </div>

</div>
<div class="bg">

    <div class="doc-content" id="content">

    </div>
